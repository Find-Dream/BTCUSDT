{% extends "base.html" %}
{% block title %}模型管理 - BTCAlpha - 比特币智能量化交易系统{% endblock %}
{% block nav_models %}active{% endblock %}
{% block content %}

  <div class="card">
    <h2 style="display:flex;align-items:center;gap:12px;">
      模型库
      <span id="model-count" style="font-size:12px;color:#7d8899;font-weight:400;"></span>
      <span style="margin-left:auto;font-size:12px;color:#7d8899;">
        晋升模型请在 K线图 页面点选时间节点</span>
    </h2>
    <div id="promote-msg" style="font-size:13px;margin-bottom:8px;"></div>
    <!-- 搜索栏 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <input id="model-search" type="text" placeholder="🔍 搜索模型 ID…"
             style="width:180px;padding:5px 10px;font-size:13px;
                    background:#0e1116;border:1px solid #2b3648;border-radius:4px;
                    color:#e6edf3;outline:none;"
             oninput="filterModels()"
             onkeydown="if(event.key==='Escape'){this.value='';filterModels();}">
      <button class="ghost" style="padding:4px 10px;font-size:12px;" onclick="document.getElementById('model-search').value='';filterModels();">清空</button>
      <span id="filter-hint" style="font-size:12px;color:#7d8899;"></span>
    </div>
    <div style="max-height:300px;overflow:auto;">
      <table>
        <thead><tr><th>ID</th><th>类型</th><th>15码指纹</th><th>时间</th><th></th></tr></thead>
        <tbody id="model-rows"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>命中信号（最近）</h2>
    <div style="max-height:220px;overflow:auto;">
      <table>
        <thead><tr><th>模型ID</th><th>类型</th><th>价格</th><th>时间</th></tr></thead>
        <tbody id="signal-rows"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>模拟持仓盈亏　<span id="pnl-total" style="font-size:13px;"></span></h2>
    <div style="max-height:260px;overflow:auto;">
      <table>
        <thead><tr><th>方向</th><th>开仓价</th><th>平仓价</th><th>收益</th><th>收益率</th><th>时间</th></tr></thead>
        <tbody id="pnl-rows"></tbody>
      </table>
    </div>
  </div>
{% endblock %}
{% block script %}
<script>
const TYPE = {1:'开多',2:'平多',3:'开空',4:'平空'};
const FP = ['spot_1','m5_1','m3_1','spot_2','m5_2','m3_2','spot_3','m5_3','m3_3',
            'spot_4','m5_4','m3_4','spot_5','m5_5','m3_5'];

let _allModels = [];  // 缓存全量模型，用于客户端过滤

function renderModelRow(m) {
  const codes = FP.map(f => m[f]).join(',');
  const t = new Date(m.uptime * 1000).toLocaleString();
  const typeLabel = TYPE[m.type] || m.type;
  const typeColor = (m.type===1||m.type===4) ? '#22c55e' : '#f87171';
  return `<tr id="mrow-${m.id}">
    <td style="font-weight:600;color:#60a5fa">#${m.id}</td>
    <td><span style="color:${typeColor};font-weight:600">${typeLabel}</span></td>
    <td style="font-family:monospace;font-size:11px;color:#9aa5b5">${codes}</td>
    <td style="color:#7d8899;font-size:12px">${t}</td>
    <td><button class="ghost" onclick="delModel(${m.id})">删除</button></td>
  </tr>`;
}

function filterModels() {
  const q = document.getElementById('model-search').value.trim();
  const tb = document.getElementById('model-rows');
  const hint = document.getElementById('filter-hint');

  const filtered = q
    ? _allModels.filter(m => String(m.id) === q)
    : _allModels;

  if (!filtered.length) {
    tb.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#7d8899;padding:16px;">
      未找到 ID 含「${q}」的模型</td></tr>`;
    hint.textContent = '无结果';
    hint.style.color = '#f87171';
  } else {
    tb.innerHTML = filtered.map(renderModelRow).join('');
    hint.textContent = q ? `共 ${filtered.length} / ${_allModels.length} 条` : '';
    hint.style.color = '#7d8899';
  }
}

function loadModels() {
  fetch('/api/models?table=model_1m').then(r => r.json()).then(rows => {
    _allModels = rows;
    document.getElementById('model-count').textContent = `共 ${rows.length} 个`;
    filterModels();  // 应用当前搜索词（重新加载后保持过滤状态）
  });
}

function delModel(id) {
  if (!confirm('删除模型 #' + id + '?')) return;
  fetch('/api/models/delete', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({table:'model_1m', id}) }).then(() => loadModels());
}

function loadSignals() {
  fetch('/api/signals').then(r => r.json()).then(rows => {
    const tb = document.getElementById('signal-rows');
    tb.innerHTML = '';
    rows.forEach(s => tb.innerHTML +=
      `<tr><td>${s.model_id}</td><td>${TYPE[s.model_type]||s.model_type}</td>
       <td>${s.last}</td><td>${s.time}</td></tr>`);
  });
}

function loadPnl() {
  fetch('/api/pnl').then(r => r.json()).then(res => {
    const tb = document.getElementById('pnl-rows');
    tb.innerHTML = '';
    res.trades.forEach(t => {
      const cls = t.profit >= 0 ? 'up' : 'down';
      tb.innerHTML += `<tr><td>${t.side==='long'?'多仓':'空仓'}</td><td>${t.open}</td>
        <td>${t.close}</td><td class="${cls}">${t.profit}</td>
        <td class="${cls}">${t.rate}%</td><td>${t.time}</td></tr>`;
    });
    const el = document.getElementById('pnl-total');
    el.textContent = '总收益 ' + res.total;
    el.className = res.total >= 0 ? 'up' : 'down';
  });
}

loadModels(); loadSignals(); loadPnl();
setInterval(() => { loadSignals(); loadPnl(); }, 20000);
</script>
{% endblock %}
